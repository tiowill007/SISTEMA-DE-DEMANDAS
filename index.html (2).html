<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Levas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --bg4: #26262e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #7a7a8c;
    --accent: #7c6cf8;
    --accent2: #9d91fa;
    --accent-bg: rgba(124,108,248,0.12);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,0.1);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.3px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .role-switcher {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .role-btn {
    padding: 5px 14px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .role-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .main { flex: 1; padding: 28px 24px; max-width: 960px; margin: 0 auto; width: 100%; }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -1px;
    font-family: 'DM Mono', monospace;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  /* BUTTON */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: var(--bg3); border-color: var(--border2); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: #8d7ef9; border-color: #8d7ef9; }

  .btn-sm { padding: 5px 11px; font-size: 12px; }

  /* BADGE / STATUS */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }

  .badge-pending { background: var(--amber-bg); color: var(--amber); }
  .badge-pending::before { background: var(--amber); }
  .badge-progress { background: var(--blue-bg); color: var(--blue); }
  .badge-progress::before { background: var(--blue); animation: pulse 1.5s ease-in-out infinite; }
  .badge-done { background: var(--green-bg); color: var(--green); }
  .badge-done::before { background: var(--green); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* TABLE */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead { background: var(--bg3); }

  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(255,255,255,0.015); }

  .leva-num {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent2);
  }

  .leva-title { font-weight: 500; font-size: 14px; }
  .leva-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .valor {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--green);
    font-weight: 500;
  }

  .date-cell { font-size: 13px; color: var(--muted); }

  .action-btns { display: flex; gap: 6px; flex-wrap: nowrap; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    animation: fadeUp 0.18s ease;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .modal-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 22px; }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type=text], input[type=number], input[type=date], select, textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,108,248,0.15);
  }

  select option { background: var(--bg2); }

  textarea { min-height: 80px; resize: vertical; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 22px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 14px;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* EDITOR VIEW: status selector */
  .status-select {
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 20px;
    cursor: pointer;
  }

  .day-summary {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--accent-bg);
    border: 1px solid rgba(124,108,248,0.2);
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 13px;
  }

  /* TOTAL BAR */
  .total-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    font-size: 13px;
  }

  .total-bar .total-value {
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    color: var(--green);
    font-size: 15px;
  }

  @media (max-width: 640px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 20px 16px; }
    .topbar { padding: 0 16px; }
    th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">▶</div>
      Levas
    </div>
    <div class="role-switcher">
      <button class="role-btn active" id="btn-gestor" onclick="setRole('gestor')">Gestor</button>
      <button class="role-btn" id="btn-editor" onclick="setRole('editor')">Editor</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- STATS (gestor only) -->
    <div class="stats-row" id="stats-section">
      <div class="stat-card">
        <div class="stat-label">Total levas</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Em andamento</div>
        <div class="stat-value" style="color:var(--blue)" id="stat-prog">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Concluídas</div>
        <div class="stat-value" style="color:var(--green)" id="stat-done">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total pago</div>
        <div class="stat-value" style="color:var(--green); font-size:20px" id="stat-valor">R$0</div>
        <div class="stat-sub" id="stat-pendente-val"></div>
      </div>
    </div>

    <!-- DAY SUMMARY (editor only, hidden by default) -->
    <div class="day-summary" id="day-summary" style="display:none">
      📅 Hoje: <strong id="day-count">0</strong> levas atribuídas
      &nbsp;·&nbsp; <span id="day-val" style="color:var(--green); font-weight:600"></span> a receber (concluídas)
    </div>

    <!-- SECTION HEADER -->
    <div class="section-header">
      <div class="section-title" id="section-title">Todas as levas</div>
      <button class="btn btn-primary" id="btn-add" onclick="openAdd()">+ Nova leva</button>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <button class="filter-chip active" onclick="setFilter('todas', this)">Todas</button>
      <button class="filter-chip" onclick="setFilter('pendente', this)">Pendentes</button>
      <button class="filter-chip" onclick="setFilter('andamento', this)">Em andamento</button>
      <button class="filter-chip" onclick="setFilter('concluido', this)">Concluídas</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:50px">#</th>
            <th>Descrição</th>
            <th>Criada em</th>
            <th>Prazo</th>
            <th>Status</th>
            <th>Valor</th>
            <th id="th-acoes">Ações</th>
          </tr>
        </thead>
        <tbody id="levas-body">
        </tbody>
      </table>
      <div id="empty-state" class="empty" style="display:none">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Nenhuma leva aqui</div>
        <div class="empty-sub">Crie uma nova leva para começar</div>
      </div>
      <div class="total-bar" id="total-bar" style="display:none">
        <span style="color:var(--muted)">Total visível (concluídas)</span>
        <span class="total-value" id="total-concluido">R$0</span>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NOVA LEVA -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-title" id="modal-title-text">Nova leva</div>
    <div class="form-group">
      <label>Título da leva</label>
      <input type="text" id="f-titulo" placeholder="Ex: Pack produto X – semana 1" />
    </div>
    <div class="form-group">
      <label>Descrição / briefing</label>
      <textarea id="f-desc" placeholder="Detalhes, links, referências..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label>Prazo de entrega</label>
        <input type="date" id="f-prazo" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-add')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarLeva()">Salvar leva</button>
    </div>
  </div>
</div>

<!-- MODAL VER DESCRIÇÃO -->
<div class="modal-overlay" id="modal-view">
  <div class="modal">
    <div class="modal-title" id="view-titulo"></div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px" id="view-meta"></p>
    <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;font-size:14px;line-height:1.7;white-space:pre-wrap" id="view-desc"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-view')">Fechar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──────────────────────────────────────────────────
const STORAGE_KEY = 'levas_v1';
const VALOR_KEY = 'levas_valor_v1';
const VALOR_FIXO_DEFAULT = 150;

function loadLevas() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveLevas(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function getValorFixo() {
  const v = localStorage.getItem(VALOR_KEY);
  return v ? parseFloat(v) : VALOR_FIXO_DEFAULT;
}

// ── STATE ─────────────────────────────────────────────────────
let role = 'gestor';
let filter = 'todas';
let editingId = null;
let levas = loadLevas();

// ── ROLE ──────────────────────────────────────────────────────
function setRole(r) {
  role = r;
  document.getElementById('btn-gestor').classList.toggle('active', r === 'gestor');
  document.getElementById('btn-editor').classList.toggle('active', r === 'editor');
  document.getElementById('stats-section').style.display = r === 'gestor' ? 'grid' : 'none';
  document.getElementById('day-summary').style.display = r === 'editor' ? 'flex' : 'none';
  document.getElementById('btn-add').style.display = r === 'gestor' ? 'inline-flex' : 'none';
  document.getElementById('th-acoes').textContent = r === 'gestor' ? 'Ações' : 'Atualizar status';
  document.getElementById('section-title').textContent = r === 'gestor' ? 'Todas as levas' : 'Minhas levas';
  render();
}

// ── FILTER ────────────────────────────────────────────────────
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── RENDER ────────────────────────────────────────────────────
function fmt(val) {
  return 'R$' + parseFloat(val || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function statusBadge(s) {
  if (s === 'pendente') return '<span class="badge badge-pending">Pendente</span>';
  if (s === 'andamento') return '<span class="badge badge-progress">Em andamento</span>';
  return '<span class="badge badge-done">Concluída</span>';
}

function render() {
  levas = loadLevas();
  const valor = getValorFixo();

  // stats
  const total = levas.length;
  const prog = levas.filter(l => l.status === 'andamento').length;
  const done = levas.filter(l => l.status === 'concluido').length;
  const pago = done * valor;
  const pendVal = (total - done) * valor;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-prog').textContent = prog;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-valor').textContent = fmt(pago);
  document.getElementById('stat-pendente-val').textContent = fmt(pendVal) + ' pendente';

  // day summary
  const today = new Date().toISOString().slice(0, 10);
  const todayLevas = levas.filter(l => l.criada === today);
  const todayDone = todayLevas.filter(l => l.status === 'concluido');
  document.getElementById('day-count').textContent = todayLevas.length;
  document.getElementById('day-val').textContent = fmt(todayDone.length * valor);

  // filter
  let visible = [...levas];
  if (filter === 'pendente') visible = visible.filter(l => l.status === 'pendente');
  if (filter === 'andamento') visible = visible.filter(l => l.status === 'andamento');
  if (filter === 'concluido') visible = visible.filter(l => l.status === 'concluido');

  const tbody = document.getElementById('levas-body');

  if (visible.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('total-bar').style.display = 'none';
    return;
  }

  document.getElementById('empty-state').style.display = 'none';

  // sort by id desc (newest first)
  visible.sort((a, b) => b.id - a.id);

  tbody.innerHTML = visible.map((l, i) => {
    const isLate = l.prazo && l.prazo < today && l.status !== 'concluido';
    const prazoHtml = l.prazo
      ? `<span style="${isLate ? 'color:var(--red)' : ''}">${fmtDate(l.prazo)}${isLate ? ' ⚠' : ''}</span>`
      : '—';

    const acoes = role === 'gestor'
      ? `<div class="action-btns">
           <button class="btn btn-sm" onclick="verLeva(${l.id})" title="Ver detalhes">👁</button>
           <button class="btn btn-sm" onclick="editarLeva(${l.id})" title="Editar">✏️</button>
           <button class="btn btn-sm" style="color:var(--red)" onclick="deletarLeva(${l.id})" title="Excluir">🗑</button>
         </div>`
      : `<select class="status-select" onchange="updateStatus(${l.id}, this.value)" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif">
           <option value="pendente" ${l.status==='pendente'?'selected':''}>Pendente</option>
           <option value="andamento" ${l.status==='andamento'?'selected':''}>Em andamento</option>
           <option value="concluido" ${l.status==='concluido'?'selected':''}>Concluída</option>
         </select>`;

    return `<tr>
      <td><span class="leva-num">#${String(l.id).padStart(3,'0')}</span></td>
      <td>
        <div class="leva-title">${escHtml(l.titulo)}</div>
        ${l.desc ? `<div class="leva-desc">${escHtml(l.desc).slice(0,60)}${l.desc.length>60?'…':''}</div>` : ''}
      </td>
      <td class="date-cell">${fmtDate(l.criada)}</td>
      <td class="date-cell">${prazoHtml}</td>
      <td>${statusBadge(l.status)}</td>
      <td><span class="valor">${fmt(l.valor)}</span></td>
      <td>${acoes}</td>
    </tr>`;
  }).join('');

  // total bar
  const totalDoneVisible = visible.filter(l => l.status === 'concluido').length;
  document.getElementById('total-bar').style.display = 'flex';
  document.getElementById('total-concluido').textContent = fmt(totalDoneVisible * valor);
}

// ── CRUD ──────────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  document.getElementById('modal-title-text').textContent = 'Nova leva';
  document.getElementById('f-titulo').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-valor').value = getValorFixo();
  document.getElementById('f-prazo').value = '';
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('f-titulo').focus(), 50);
}

function editarLeva(id) {
  levas = loadLevas();
  const l = levas.find(x => x.id === id);
  if (!l) return;
  editingId = id;
  document.getElementById('modal-title-text').textContent = 'Editar leva';
  document.getElementById('f-titulo').value = l.titulo;
  document.getElementById('f-desc').value = l.desc || '';
  document.getElementById('f-valor').value = l.valor;
  document.getElementById('f-prazo').value = l.prazo || '';
  document.getElementById('modal-add').classList.add('open');
}

function salvarLeva() {
  const titulo = document.getElementById('f-titulo').value.trim();
  if (!titulo) { toast('Informe o título da leva'); return; }
  const valor = parseFloat(document.getElementById('f-valor').value) || getValorFixo();
  const desc = document.getElementById('f-desc').value.trim();
  const prazo = document.getElementById('f-prazo').value;

  levas = loadLevas();

  if (editingId !== null) {
    const idx = levas.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      levas[idx] = { ...levas[idx], titulo, desc, valor, prazo };
    }
    toast('Leva atualizada ✓');
  } else {
    const newId = levas.length > 0 ? Math.max(...levas.map(l => l.id)) + 1 : 1;
    levas.push({
      id: newId,
      titulo,
      desc,
      valor,
      prazo,
      status: 'pendente',
      criada: new Date().toISOString().slice(0, 10)
    });
    toast('Leva criada ✓');
  }

  saveLevas(levas);
  closeModal('modal-add');
  render();
}

function deletarLeva(id) {
  if (!confirm('Excluir esta leva?')) return;
  levas = loadLevas().filter(l => l.id !== id);
  saveLevas(levas);
  toast('Leva excluída');
  render();
}

function updateStatus(id, status) {
  levas = loadLevas();
  const l = levas.find(x => x.id === id);
  if (l) { l.status = status; saveLevas(levas); render(); toast('Status atualizado ✓'); }
}

function verLeva(id) {
  levas = loadLevas();
  const l = levas.find(x => x.id === id);
  if (!l) return;
  document.getElementById('view-titulo').textContent = l.titulo;
  document.getElementById('view-meta').textContent =
    `#${String(l.id).padStart(3,'0')} · Criada: ${fmtDate(l.criada)} · Prazo: ${fmtDate(l.prazo)} · ${fmt(l.valor)}`;
  document.getElementById('view-desc').textContent = l.desc || '(sem descrição)';
  document.getElementById('modal-view').classList.add('open');
}

// ── MODAL ─────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── HELPERS ───────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INIT ──────────────────────────────────────────────────────
render();
</script>
</body>
</html>
